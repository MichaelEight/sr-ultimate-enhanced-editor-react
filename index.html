<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/logo.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Supreme Ruler Editor" />
    <link rel="apple-touch-icon" href="/logo.webp" />
    <link rel="manifest" href="/manifest.json" />
    <title>Supreme Ruler Editor</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <!-- GoatCounter analytics (cookie-less, GDPR-safe). Loads only outside localhost. -->
    <script>
      ;(function () {
        var code = 'michaeleight' // shared site code across app.michaeleight.com
        if (!code || location.hostname === 'localhost') return
        var s = document.createElement('script')
        s.async = true
        s.src = 'https://gc.zgo.at/count.js'
        s.dataset.goatcounter = 'https://' + code + '.goatcounter.com/count'
        document.head.appendChild(s)
      })()
    </script>
  </body>
</html>
